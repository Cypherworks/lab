# Guardrails. Run on every commit; install with `pre-commit install`.
# Public-repo safety depends on these — do not disable without good reason.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
        # Bare-token templates must render with NO trailing newline — an appended
        # \n would corrupt the token when read.
        exclude: '(^|/)hass_token\.j2$'
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: sops-encrypted
        name: ensure SOPS files are encrypted
        entry: scripts/check-sops-encrypted.sh
        language: script
        files: '\.sops\.(ya?ml|json|env|tfvars)$'
        # Exclude the SOPS config file itself — it is not a secret.
        exclude: '(^|/)\.sops\.ya?ml$'
