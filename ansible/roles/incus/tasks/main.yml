---
- name: Ensure the apt keyrings directory exists
  become: true
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"

# Fingerprint 4EFC 5906 96CB 15B8 7C73 A3AD 82CC 8797 C838 DCFD (Zabbly).
- name: Install the Zabbly repository key
  become: true
  ansible.builtin.get_url:
    url: https://pkgs.zabbly.com/key.asc
    dest: /etc/apt/keyrings/zabbly.asc
    mode: "0644"

- name: Add the Zabbly Incus repository
  become: true
  ansible.builtin.deb822_repository:
    name: zabbly-incus
    types: [deb]
    uris: "https://pkgs.zabbly.com/incus/{{ incus_zabbly_channel }}"
    suites: ["{{ ansible_distribution_release }}"]
    components: [main]
    architectures: ["{{ 'amd64' if ansible_architecture == 'x86_64' else ansible_architecture }}"]
    signed_by: /etc/apt/keyrings/zabbly.asc

# Pin Incus to the Zabbly origin so neither apt nor unattended-upgrades can ever resolve
# it to the Ubuntu archive's incus. That cross-origin conflict (Ubuntu 6.0.0 vs Zabbly
# 7.0) once left the whole incus stack autoremoved and the cluster dead.
- name: Pin Incus to the Zabbly repository
  become: true
  ansible.builtin.copy:
    dest: /etc/apt/preferences.d/incus-zabbly.pref
    content: |
      # Managed by the incus role. Zabbly incus is always preferred; the Ubuntu
      # archive's incus is never installable.
      Package: incus*
      Pin: origin "pkgs.zabbly.com"
      Pin-Priority: 1001

      Package: incus*
      Pin: release o=Ubuntu
      Pin-Priority: -1
    owner: root
    group: root
    mode: "0644"

- name: Install storage tooling
  become: true
  ansible.builtin.apt:
    name: "{{ incus_tooling }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

# With the Zabbly pin above, apt installs the Zabbly 7.0 build directly (no Ubuntu-6.x
# detour). Upgrade cluster members together to avoid a prolonged version skew. Held below,
# so a deliberate version bump needs a manual `apt-mark unhold` first.
- name: Install Incus from Zabbly
  become: true
  ansible.builtin.apt:
    name: "{{ incus_packages }}"
    state: present
    update_cache: true

# The incus-ui-canonical web UI was dropped (we use the CLI). Ensure it's gone and not
# left holding: the outage recovery marked it held on the cluster nodes without ever
# installing it, and that held-but-absent state blocked the converge. allow_change_held
# lets this deliberate removal past the hold; incus doesn't depend on the UI, so nothing
# else is touched.
- name: Remove the Incus web UI
  become: true
  ansible.builtin.apt:
    name: incus-ui-canonical
    state: absent
    allow_change_held_packages: true

# Only clear the selection if dpkg actually knows the package. On a freshly flashed node
# the UI was never installed and never held, so dpkg has no record of it at all, and
# dpkg --set-selections errors ("Failed to find package") rather than no-opping. The
# held-but-absent artifact this clears only exists on nodes that lived through the outage,
# where dpkg does have a record — so gate on that.
- name: Check whether dpkg knows the Incus web UI package
  become: true
  ansible.builtin.command: dpkg-query -W incus-ui-canonical
  register: _incus_ui_known
  changed_when: false
  failed_when: false

- name: Clear any leftover hold on the Incus web UI
  become: true
  ansible.builtin.dpkg_selections:
    name: incus-ui-canonical
    selection: deinstall
  when: _incus_ui_known.rc == 0

# Hold the stack so unattended-upgrades can neither change nor autoremove it (the latter
# is what removed incus-client and killed the cluster). Runs after install so the packages
# are known to dpkg.
- name: Hold the incus packages against unattended-upgrades
  become: true
  ansible.builtin.dpkg_selections:
    name: "{{ item }}"
    selection: hold
  loop: "{{ incus_hold_packages }}"

- name: Allow the ansible user to drive Incus
  become: true
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    groups: incus-admin
    append: true

- name: Render per-VLAN bridges for instance networking
  become: true
  ansible.builtin.template:
    src: incus-netplan.yaml.j2
    dest: /etc/netplan/70-incus.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply incus netplan

- name: Bring the bridges up before any profile references them
  ansible.builtin.meta: flush_handlers

# Every member has its own local storage; in a cluster the pool is defined
# cluster-wide with a per-member source.
- name: Carve a dedicated LV for Incus storage
  become: true
  community.general.lvol:
    vg: "{{ incus_storage_vg }}"
    lv: "{{ incus_storage_lv }}"
    size: "{{ incus_storage_size }}"
    state: present

- name: Detect existing storage pools
  become: true
  ansible.builtin.command: incus storage list --format csv
  register: _incus_storage
  changed_when: false
  failed_when: false

- name: Detect cluster membership
  become: true
  ansible.builtin.command: incus cluster list --format csv
  register: _incus_cluster
  changed_when: false
  failed_when: false

# Whether the local daemon considers itself clustered. server_clustered is a local
# config flag, so it stays true for a member even without quorum (a peer down, packages
# just reinstalled) and is false for a bare standalone daemon — unlike `incus cluster
# list`, which needs quorum. This is the membership signal whenever the daemon answers.
- name: Ask the daemon whether this node is clustered
  become: true
  ansible.builtin.command: incus query /1.0
  register: _incus_server
  changed_when: false
  failed_when: false

# On-disk fallback for when the daemon is down and can't be asked: a real member's
# cluster database exists. A bare standalone daemon ALSO creates database/global on
# first start, so this file is trusted only as a last resort (daemon unreachable),
# never as proof of membership on its own — treating it as proof was what stopped
# freshly-provisioned nodes from ever joining.
- name: Check for existing Incus cluster data on this node
  become: true
  ansible.builtin.stat:
    path: /var/lib/incus/database/global
  register: _incus_db

- name: Establish whether this host bootstraps the cluster
  ansible.builtin.set_fact:
    _incus_is_bootstrap: "{{ (not incus_cluster_enabled) or inventory_hostname == incus_cluster_bootstrap_host }}"
    _incus_has_cluster_data: "{{ _incus_db.stat.exists }}"
    _incus_is_member: >-
      {{ (incus_cluster_member_name in _incus_cluster.stdout)
         or ((_incus_server.stdout | from_json).environment.server_clustered
             if (_incus_server.rc == 0 and (_incus_server.stdout | trim | length) > 0)
             else _incus_db.stat.exists) }}

# --- Bootstrap member (or a standalone host) ---
- name: Initialise the bootstrap member from preseed
  become: true
  ansible.builtin.command:
    cmd: incus admin init --preseed
    stdin: "{{ lookup('template', 'incus-preseed.yml.j2') }}"
  when:
    - _incus_is_bootstrap
    - not _incus_is_member
    - incus_storage_pool not in _incus_storage.stdout
  changed_when: true

# Clustering uses core.https_address as the member's cluster address and rejects a
# wildcard, so bind it to this host's real IP before enabling.
- name: Bind the bootstrap API to a specific address
  become: true
  ansible.builtin.command: "incus config set core.https_address {{ incus_cluster_address }}:8443"
  when:
    - incus_cluster_enabled
    - _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Enable clustering on the bootstrap member
  become: true
  ansible.builtin.command: "incus cluster enable {{ incus_cluster_member_name }}"
  when:
    - incus_cluster_enabled
    - _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Ensure a profile exists per lab VLAN
  become: true
  ansible.builtin.command: "incus profile create {{ item.name }}"
  register: _incus_profile
  changed_when: _incus_profile.rc == 0
  failed_when: _incus_profile.rc != 0 and 'already exists' not in _incus_profile.stderr
  loop: "{{ incus_networks }}"
  when: _incus_is_bootstrap

- name: Give each VLAN profile a bridged NIC
  become: true
  ansible.builtin.command: "incus profile device add {{ item.name }} eth0 nic nictype=bridged parent={{ item.bridge }} name=eth0"
  register: _incus_profile_nic
  changed_when: _incus_profile_nic.rc == 0
  failed_when: _incus_profile_nic.rc != 0 and 'already exists' not in _incus_profile_nic.stderr
  loop: "{{ incus_networks }}"
  when: _incus_is_bootstrap

# --- Joining members ---
# The token is single-use and minted on the bootstrap, so only mint it when this
# host still needs to join.
- name: Mint a join token on the bootstrap member
  become: true
  ansible.builtin.command: "incus cluster add {{ incus_cluster_member_name }}"
  delegate_to: "{{ incus_cluster_bootstrap_host }}"
  register: _incus_join_token
  when:
    - incus_cluster_enabled
    - not _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

- name: Join the cluster
  become: true
  ansible.builtin.command:
    cmd: incus admin init --preseed
    stdin: "{{ lookup('template', 'incus-join.yml.j2') }}"
  when:
    - incus_cluster_enabled
    - not _incus_is_bootstrap
    - not _incus_is_member
  changed_when: true

# --- Weekly btrfs scrub (early corruption detection) ---
- name: Locate the btrfs binary (path differs across distros)
  become: true
  ansible.builtin.command: which btrfs
  register: _incus_btrfs_bin_lookup
  changed_when: false
  when: incus_scrub_enabled

- name: Set the btrfs binary path
  ansible.builtin.set_fact:
    _incus_btrfs_bin: "{{ _incus_btrfs_bin_lookup.stdout }}"
  when: incus_scrub_enabled

- name: Install the btrfs scrub service + timer
  become: true
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "/etc/systemd/system/{{ item }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - incus-btrfs-scrub.service
    - incus-btrfs-scrub.timer
  when: incus_scrub_enabled

- name: Enable the btrfs scrub timer
  become: true
  ansible.builtin.systemd_service:
    name: incus-btrfs-scrub.timer
    enabled: true
    state: started
    daemon_reload: true
  when: incus_scrub_enabled

# --- Cold-boot recovery gate (#188) ---
# No UPS on the compute tier: a mains cut hard-kills every node and power-return must
# bring the estate back unattended. This gate holds the Incus daemon until the lab
# gateway answers, so it doesn't form the cluster / autostart instances into a dead
# network. Enabling it does NOT restart Incus — the ordering only takes effect at the
# next boot, so a converge never bounces running instances.
- name: Install the Incus cold-boot gate script
  become: true
  ansible.builtin.copy:
    src: incus-boot-gate
    dest: /usr/local/sbin/incus-boot-gate
    owner: root
    group: root
    mode: "0755"
  when: incus_boot_gate_enabled

- name: Install the Incus cold-boot gate service
  become: true
  ansible.builtin.template:
    src: incus-boot-gate.service.j2
    dest: /etc/systemd/system/incus-boot-gate.service
    owner: root
    group: root
    mode: "0644"
  when: incus_boot_gate_enabled

- name: Ensure the Incus service drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/incus.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: incus_boot_gate_enabled

- name: Order the Incus daemon behind the cold-boot gate
  become: true
  ansible.builtin.copy:
    src: incus-boot-gate.dropin.conf
    dest: /etc/systemd/system/incus.service.d/10-boot-gate.conf
    owner: root
    group: root
    mode: "0644"
  when: incus_boot_gate_enabled

- name: Enable the Incus cold-boot gate for next boot
  become: true
  ansible.builtin.systemd_service:
    name: incus-boot-gate.service
    enabled: true
    daemon_reload: true
  when: incus_boot_gate_enabled
