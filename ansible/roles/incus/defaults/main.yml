---
# Incus from the Zabbly repo (the upstream Incus repository). The lts-7.0 channel gives
# the Incus 7.0.x LTS line; pinning to Zabbly also keeps apt off the Ubuntu archive's
# incus (the 6.0.0-vs-7.0 conflict that once got the whole stack autoremoved). We run the
# CLI only — the incus-ui-canonical web UI was dropped. Storage tooling stays from the OS.
incus_zabbly_channel: lts-7.0
incus_packages:
  - incus
# Packages pinned to the Zabbly origin and held, so neither apt nor unattended-upgrades
# can downgrade them to the Ubuntu archive's incus (a 6.0.0-vs-7.0 conflict once got the
# whole stack autoremoved) or autoremove them. Includes the deps incus pulls in.
incus_hold_packages:
  - incus
  - incus-base
  - incus-client
incus_tooling:
  - lvm2
  - btrfs-progs

# Storage: a dedicated LV carved from the OS volume group's free space, which
# Incus formats btrfs (CoW + snapshots, in-kernel). Incus's LVM driver insists on
# owning a whole empty VG, so we give it a block device instead of sharing the VG.
# Override incus_storage_size per host if the disk differs.
incus_storage_pool: default
incus_storage_vg: ubuntu-vg
incus_storage_lv: incus
incus_storage_size: 120g

# Weekly btrfs scrub of the storage pool — reads and verifies every block against its
# checksum, surfacing corruption early (and self-healing duplicated metadata) before
# it can force the pool read-only. Read/verify only; no writes.
incus_scrub_enabled: true
incus_scrub_schedule: "Sun *-*-* 03:00:00"   # systemd OnCalendar
incus_scrub_pool_path: "/var/lib/incus/storage-pools/{{ incus_storage_pool }}"

# Remote API listener so the Incus client and Terraform can manage the host.
incus_https_address: "[::]:8443"

# Host NIC that carries the tagged lab VLANs (a trunk port). Per-VLAN bridges are
# built on top of it. Defaults to the interface holding the default route: base
# matches the NIC by glob but doesn't rename it, so the real kernel name (e.g.
# enp0s31f6) is what the VLAN link needs, not the logical "lab0". Override per host.
incus_uplink_interface: "{{ ansible_default_ipv4.interface }}"

# Lab VLANs exposed to instances. Each entry renders <uplink>.<vlan> -> <bridge>
# in netplan and an Incus profile with a bridged NIC on that bridge. The host
# keeps its own address on the uplink (servers VLAN); these bridges carry no host IP.
incus_networks:
  - name: services
    vlan: 30
    bridge: br30

# Clustering for a single management plane across the nodes. The bootstrap member
# converts in place (incus cluster enable); the rest join with a single-use token
# minted on the bootstrap. Set incus_cluster_bootstrap_host to the bootstrap's
# inventory_hostname in inventory (required when clustering). Storage stays local
# per member — the cluster needs no shared storage.
incus_cluster_enabled: true
incus_cluster_bootstrap_host: ""
incus_cluster_member_name: "{{ inventory_hostname }}"
incus_cluster_address: "{{ ansible_default_ipv4.address }}"

# Cold-boot recovery gate (#188). No UPS on the compute tier, so a mains cut hard-kills
# every node at once and power-return has to bring the estate back with no human present.
# On boot each node races the switch and DNS coming up; this gate holds the Incus daemon
# until the lab gateway answers, so it doesn't form the cluster or autostart instances
# into a dead network. The default target is the discovered default-route gateway; the
# timeout is the ceiling after which the gate releases the daemon anyway (fail-open —
# Incus quorum then holds instances back if the network is still down).
incus_boot_gate_enabled: true
incus_boot_gate_target: "{{ ansible_default_ipv4.gateway }}"
incus_boot_gate_timeout: 300
