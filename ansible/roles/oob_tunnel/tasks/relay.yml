---
# Relay side: a system user that exists only to terminate the reverse tunnel. Its single
# authorised key is restricted to port-forwarding — no shell, no pty, no command — so a
# stolen tunnel key yields a forward and nothing else. With the relay's default
# GatewayPorts (no), the reverse forward binds the relay's loopback only, so the tunnel is
# reachable exclusively from an operator already logged in to the relay.
- name: Create the forwarding-only relay user
  become: true
  ansible.builtin.user:
    name: "{{ oob_tunnel_relay_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: true
    home: "/var/lib/{{ oob_tunnel_relay_user }}"

- name: Authorise the tunnel key for one scoped reverse forward only
  become: true
  ansible.posix.authorized_key:
    user: "{{ oob_tunnel_relay_user }}"
    key: "{{ oob_tunnel_public_key }}"
    # restrict = no shell/pty/agent/x11; port-forwarding re-enables forwarding, then
    # permitopen=none blocks all local (-L) forwards and permitlisten scopes the reverse
    # (-R) forward to exactly the break-glass port — so a stolen tunnel key can only ever
    # create the one intended forward, nothing else.
    key_options: 'restrict,port-forwarding,permitopen="none",permitlisten="127.0.0.1:{{ oob_tunnel_remote_bind_port }}"'
    exclusive: true

# Keep the tunnel working even if a global `AllowTcpForwarding no` is later applied to
# this box (e.g. by CIS hardening) — a hardening pass severing the out-of-band path is the
# exact failure the OOB exists to survive. Scoped to the forwarding-only user, and the
# config is syntax-checked before it's allowed to land.
- name: Permit forwarding for the OOB user regardless of the global sshd policy
  become: true
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/70-oob.conf
    content: |
      Match User {{ oob_tunnel_relay_user }}
          AllowTcpForwarding yes
          PermitTTY no
          X11Forwarding no
          AllowAgentForwarding no
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  notify: Reload sshd
