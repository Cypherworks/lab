---
# Relay side. When the switch is on, provision a system user that exists only to terminate
# the reverse tunnel: its single authorised key is restricted to one scoped port-forward —
# no shell, no pty, no command — so a stolen tunnel key yields that forward and nothing
# else, and with the relay's default GatewayPorts (no) it binds the relay's loopback only.
# When the switch is off, the user, its key and the sshd drop-in are removed entirely, so
# nothing OOB-related stands on the internet-facing relay between trips.
- name: Provision the forwarding-only relay user
  become: true
  ansible.builtin.user:
    name: "{{ oob_tunnel_relay_user }}"
    system: true
    shell: /usr/sbin/nologin
    create_home: true
    home: "/var/lib/{{ oob_tunnel_relay_user }}"
  when: oob_tunnel_enabled | bool

- name: Authorise the tunnel key for one scoped reverse forward only
  become: true
  ansible.posix.authorized_key:
    user: "{{ oob_tunnel_relay_user }}"
    key: "{{ oob_tunnel_public_key }}"
    # restrict = no shell/pty/agent/x11; port-forwarding re-enables forwarding, then
    # permitopen=none blocks all local (-L) forwards and permitlisten scopes the reverse
    # (-R) forward to exactly the break-glass port — so a stolen tunnel key can only ever
    # create the one intended forward, nothing else.
    key_options: 'restrict,port-forwarding,permitopen="none",permitlisten="127.0.0.1:{{ oob_tunnel_remote_bind_port }}"'
    exclusive: true
  when: oob_tunnel_enabled | bool

# Keep the tunnel working even if a global `AllowTcpForwarding no` is later applied to
# this box (e.g. by CIS hardening) — a hardening pass severing the out-of-band path is the
# exact failure the OOB exists to survive. Scoped to the forwarding-only user, and the
# config is syntax-checked before it's allowed to land.
- name: Permit forwarding for the OOB user regardless of the global sshd policy
  become: true
  ansible.builtin.copy:
    dest: /etc/ssh/sshd_config.d/70-oob.conf
    content: |
      Match User {{ oob_tunnel_relay_user }}
          AllowTcpForwarding yes
          PermitTTY no
          X11Forwarding no
          AllowAgentForwarding no
    owner: root
    group: root
    mode: "0644"
    validate: /usr/sbin/sshd -t -f %s
  when: oob_tunnel_enabled | bool
  notify: Reload sshd

# Teardown when the switch is off — leave nothing standing on the internet-facing relay.
- name: Remove the sshd drop-in when OOB is disabled
  become: true
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d/70-oob.conf
    state: absent
  when: not (oob_tunnel_enabled | bool)
  notify: Reload sshd

- name: Remove the relay user when OOB is disabled
  become: true
  ansible.builtin.user:
    name: "{{ oob_tunnel_relay_user }}"
    state: absent
    remove: true
  when: not (oob_tunnel_enabled | bool)
