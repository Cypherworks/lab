---
# Client side: autossh maintains a persistent reverse tunnel outbound to the relay. The
# tunnel key and known_hosts live under a root-only config dir; systemd restarts the
# tunnel on any drop.
- name: Install autossh
  become: true
  ansible.builtin.apt:
    name: autossh
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Create the tunnel config directory
  become: true
  ansible.builtin.file:
    path: "{{ oob_tunnel_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0700"

- name: Install the tunnel private key
  become: true
  ansible.builtin.copy:
    content: "{{ oob_tunnel_private_key }}"
    dest: "{{ oob_tunnel_config_dir }}/id_tunnel"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  notify: Restart oob-tunnel

# Pin the relay host key when supplied; otherwise autossh trusts on first use
# (accept-new) and records it here. Managed as a known_hosts to keep StrictHostKeyChecking
# meaningful rather than disabled.
- name: Pin the relay SSH host key
  become: true
  ansible.builtin.copy:
    content: "{{ oob_tunnel_relay_host }} {{ oob_tunnel_relay_host_key }}\n"
    dest: "{{ oob_tunnel_config_dir }}/known_hosts"
    owner: root
    group: root
    mode: "0644"
  when: oob_tunnel_relay_host_key | length > 0
  notify: Restart oob-tunnel

- name: Ensure a known_hosts exists for trust-on-first-use
  become: true
  ansible.builtin.copy:
    content: ""
    dest: "{{ oob_tunnel_config_dir }}/known_hosts"
    owner: root
    group: root
    mode: "0644"
    force: false
  when: oob_tunnel_relay_host_key | length == 0

- name: Render the tunnel systemd unit
  become: true
  ansible.builtin.template:
    src: oob-tunnel.service.j2
    dest: /etc/systemd/system/oob-tunnel.service
    owner: root
    group: root
    mode: "0644"
  notify: Restart oob-tunnel

# Config, key and unit are staged unconditionally (dormant, root-only, in-lab) so
# enabling is an instant service start. The switch only gates whether the tunnel runs.
- name: Set the tunnel service state to match the switch
  become: true
  ansible.builtin.systemd_service:
    name: oob-tunnel.service
    enabled: "{{ oob_tunnel_enabled | bool }}"
    state: "{{ 'started' if oob_tunnel_enabled | bool else 'stopped' }}"
    daemon_reload: true
