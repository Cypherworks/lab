---
- name: Create the etcd system group
  become: true
  ansible.builtin.group:
    name: etcd
    system: true

- name: Create the etcd system user
  become: true
  ansible.builtin.user:
    name: etcd
    group: etcd
    system: true
    shell: /usr/sbin/nologin
    home: "{{ etcd_data_dir }}"
    create_home: false

- name: Download the pinned etcd release
  become: true
  ansible.builtin.get_url:
    url: "{{ etcd_url }}"
    dest: "/tmp/{{ etcd_archive }}"
    mode: "0644"

- name: Extract etcd binaries
  become: true
  ansible.builtin.unarchive:
    src: "/tmp/{{ etcd_archive }}"
    dest: /usr/local/bin
    remote_src: true
    extra_opts:
      - --strip-components=1
      - --wildcards
      - "*/etcd"
      - "*/etcdctl"
    creates: "/usr/local/bin/etcd"

- name: Ensure etcd binaries are executable
  become: true
  ansible.builtin.file:
    path: "/usr/local/bin/{{ item }}"
    mode: "0755"
    owner: root
    group: root
  loop:
    - etcd
    - etcdctl

- name: Create the etcd config directory
  become: true
  ansible.builtin.file:
    path: "{{ etcd_conf_dir }}"
    state: directory
    owner: root
    group: etcd
    mode: "0750"

- name: Create the etcd data directory
  become: true
  ansible.builtin.file:
    path: "{{ etcd_data_dir }}"
    state: directory
    owner: etcd
    group: etcd
    mode: "0700"

# Fresh node joins a live cluster (member add + 'existing') or bootstraps new.
- name: Check whether this etcd node is already initialised
  become: true
  ansible.builtin.stat:
    path: "{{ etcd_data_dir }}/member"
  register: _etcd_member_dir

- name: Build the peer client-endpoint list (every member but this one)
  ansible.builtin.set_fact:
    _etcd_peer_endpoints: >-
      {{ etcd_members | rejectattr('name', 'equalto', inventory_hostname)
         | map(attribute='ip') | map('regex_replace', '^', 'http://')
         | map('regex_replace', '$', ':2379') | join(',') }}

- name: Look up the live cluster's membership from an existing peer
  become: true
  ansible.builtin.command:
    argv:
      - etcdctl
      - "--endpoints={{ _etcd_peer_endpoints }}"
      - member
      - list
  environment:
    ETCDCTL_API: "3"
  register: _etcd_live_members
  changed_when: false
  failed_when: false
  when: not _etcd_member_dir.stat.exists

- name: Decide whether this fresh node joins a live cluster or bootstraps a new one
  ansible.builtin.set_fact:
    _etcd_join_existing: "{{ (not _etcd_member_dir.stat.exists) and (_etcd_live_members.rc | default(1)) == 0 }}"

- name: Register this node with the live cluster before it starts
  become: true
  ansible.builtin.command:
    argv:
      - etcdctl
      - "--endpoints={{ _etcd_peer_endpoints }}"
      - member
      - add
      - "{{ inventory_hostname }}"
      - "--peer-urls=http://{{ etcd_bind_ip }}:2380"
  environment:
    ETCDCTL_API: "3"
  when:
    - _etcd_join_existing
    - inventory_hostname not in (_etcd_live_members.stdout | default(''))
  changed_when: true

# Only fresh/joining nodes render (and thus start from) this file — see above.
- name: Render the etcd config
  become: true
  ansible.builtin.template:
    src: etcd.conf.yml.j2
    dest: "{{ etcd_config_file }}"
    owner: root
    group: etcd
    mode: "0640"
  when: not _etcd_member_dir.stat.exists
  notify: Restart etcd

- name: Install the etcd systemd unit
  become: true
  ansible.builtin.template:
    src: etcd.service.j2
    dest: /etc/systemd/system/etcd.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
    - Restart etcd

- name: Enable and start etcd
  become: true
  ansible.builtin.systemd_service:
    name: etcd
    enabled: true
    state: started
    daemon_reload: true
