---
# Authentik identity provider — the OIDC IdP that gates the Headscale overlay with
# MFA. Deploys the official upstream docker-compose stack (server + worker +
# postgresql) verbatim; pinned for reproducibility, bump deliberately.
authentik_image: ghcr.io/goauthentik/server
authentik_tag: "2026.5.3"

# Where the compose file, .env, and bind-mounts live on the host.
authentik_data_dir: /opt/authentik

# Postgres identity. The password has no default and MUST be supplied (from SOPS)
# as authentik_pg_password.
authentik_pg_user: authentik
authentik_pg_db: authentik

# Listen ports. Caddy terminates TLS (wildcard cert) and reverse-proxies to the
# HTTP port; Authentik trusts the X-Forwarded-* headers.
authentik_http_port: 9000
authentik_https_port: 9443

# Secrets — supplied from SOPS (host_vars/authentik.sops.yml), no defaults.
authentik_secret_key: ""
authentik_pg_password: ""
