---
# Authentik OIDC realm + admin group + ACL. Add on first run, modify thereafter
# to pick up a rotated client secret. NOTE: verify flag names against PVE 9's
# `pveum realm add --help` (esp. username-claim / the groups-sync flags).
- name: Read the existing realms
  become: true
  ansible.builtin.command: pveum realm list --output-format json
  register: proxmox_realms
  changed_when: false

- name: Set whether the OIDC realm already exists
  ansible.builtin.set_fact:
    proxmox_oidc_exists: "{{ proxmox_oidc_realm in (proxmox_realms.stdout | from_json | map(attribute='realm') | list) }}"

- name: Add the Authentik OIDC realm
  become: true
  ansible.builtin.command:
    argv:
      - pveum
      - realm
      - add
      - "{{ proxmox_oidc_realm }}"
      - --type
      - openid
      - --issuer-url
      - "{{ proxmox_oidc_issuer_url }}"
      - --client-id
      - "{{ proxmox_oidc_client_id }}"
      - --client-key
      - "{{ proxmox_oidc_client_secret }}"
      - --username-claim
      - "{{ proxmox_oidc_username_claim }}"
      - --groups-claim
      - "{{ proxmox_oidc_groups_claim }}"
      - --groups-autocreate
      - "{{ '1' if proxmox_oidc_groups_autocreate else '0' }}"
      - --groups-overwrite
      - "{{ '1' if proxmox_oidc_groups_overwrite else '0' }}"
      - --autocreate
      - "1"
      - --default
      - "{{ '1' if proxmox_oidc_default else '0' }}"
  when: not proxmox_oidc_exists
  changed_when: true
  no_log: true

- name: Update the Authentik OIDC realm
  become: true
  ansible.builtin.command:
    argv:
      - pveum
      - realm
      - modify
      - "{{ proxmox_oidc_realm }}"
      - --issuer-url
      - "{{ proxmox_oidc_issuer_url }}"
      - --client-id
      - "{{ proxmox_oidc_client_id }}"
      - --client-key
      - "{{ proxmox_oidc_client_secret }}"
      - --groups-claim
      - "{{ proxmox_oidc_groups_claim }}"
      - --groups-autocreate
      - "{{ '1' if proxmox_oidc_groups_autocreate else '0' }}"
      - --groups-overwrite
      - "{{ '1' if proxmox_oidc_groups_overwrite else '0' }}"
      - --autocreate
      - "1"
      - --default
      - "{{ '1' if proxmox_oidc_default else '0' }}"
  when: proxmox_oidc_exists
  changed_when: true
  no_log: true

# Pre-created PVE group the groups claim maps to; the ACL below grants admin.
- name: Read the existing PVE groups
  become: true
  ansible.builtin.command: pveum group list --output-format json
  register: proxmox_groups
  changed_when: false

- name: Create the admin group
  become: true
  ansible.builtin.command: "pveum group add {{ proxmox_admin_group }}"
  when: proxmox_admin_group not in (proxmox_groups.stdout | from_json | map(attribute='groupid') | list)
  changed_when: true

# Idempotent: pveum acl modify re-applies the same binding without error.
- name: Grant the admin group its role on the root path
  become: true
  ansible.builtin.command: "pveum acl modify / -group {{ proxmox_admin_group }} -role {{ proxmox_admin_role }}"
  changed_when: true
