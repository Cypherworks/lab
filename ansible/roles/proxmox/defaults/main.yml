---
# Standalone Proxmox VE host config (PVE 9.x / Debian 13). Layers onto a stock
# install: no-sub apt repo, NVMe thin pool, NAS NFS, Authentik OIDC realm. Host
# login (SSSD) + node_exporter are separate roles. Site data set by the deploy
# (build_hosts group_vars). PVE-9 specifics to verify are noted in the README.

# Swap the enterprise apt repo (401s w/o a sub) for no-subscription (trixie).
proxmox_manage_repos: true
proxmox_repo_suite: trixie
proxmox_repo_keyring: /usr/share/keyrings/proxmox-archive-keyring.gpg
# Enterprise .sources to disable (Enabled: false), relative to sources.list.d.
proxmox_enterprise_sources:
  - pve-enterprise.sources
  - ceph.sources

# NVMe VG + thin pool filling the disk, as PVE lvmthin. Empty device = skip.
proxmox_nvme_device: ""            # e.g. /dev/nvme0n1
proxmox_nvme_vg: nvme
proxmox_nvme_thinpool: vmstore
proxmox_nvme_storage_id: local-nvme
proxmox_nvme_content: "images,rootdir"

# NAS: a Synology NFS export as PVE storage. Empty server = skip.
proxmox_nas_storage_id: nas
proxmox_nas_server: ""             # e.g. 10.200.20.30
proxmox_nas_export: ""             # e.g. /volume1/Proxmox_Data
proxmox_nas_content: "images,iso,vztmpl,backup,snippets"

# Authentik OIDC realm -> proxmox app; groups claim -> admin ACL. Empty = skip.
proxmox_oidc_realm: authentik
proxmox_oidc_issuer_url: ""  # https://auth.<domain>/application/o/proxmox/
proxmox_oidc_client_id: ""
proxmox_oidc_client_secret: ""
proxmox_oidc_username_claim: username
proxmox_oidc_groups_claim: groups
# Sync claim groups onto PVE groups on login (so the admin ACL applies).
proxmox_oidc_groups_autocreate: true
proxmox_oidc_groups_overwrite: true
proxmox_oidc_default: false  # default realm on the login screen
# PVE suffixes synced groups with the realm, so ACL proxmox-admins-<realm>.
proxmox_admin_group: "proxmox-admins-{{ proxmox_oidc_realm }}"
proxmox_admin_role: Administrator

# Ops SSH keys installed for root (admin + Ansible access). Site data.
proxmox_ops_ssh_authorized_keys: []
