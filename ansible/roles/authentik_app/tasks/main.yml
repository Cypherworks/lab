---
# Docker itself comes from the shared `docker` role (meta dependency).
- name: Create the Authentik compose directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create the blueprints directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_blueprints_dir }}"
    state: directory
    owner: root
    group: root
    # World-readable: the dir is bind-mounted into the container, which runs as a
    # non-root user that must read it to discover the blueprints. No secrets here
    # (the blueprint reads creds via !Env).
    mode: "0755"

- name: Create the Authentik media directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_media_dir }}/public"
    state: directory
    owner: root
    group: root
    # Bind-mounted at /media; the container's non-root user must read served assets.
    mode: "0755"

- name: Deploy branding assets into the media dir
  become: true
  ansible.builtin.copy:
    src: "{{ item.src }}"
    dest: "{{ authentik_media_dir }}/public/{{ item.name }}"
    owner: root
    group: root
    mode: "0644"
  loop: "{{ authentik_branding_files }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart authentik

# LDAPS cert issued from OpenBao PKI before blueprint/compose consume it.
- name: Issue the LDAPS outpost cert from OpenBao PKI
  ansible.builtin.include_tasks: ldaps_cert.yml
  when: authentik_ldaps_pki_role | length > 0

# authentik runs blueprint discovery at worker startup, not via a live file-watch,
# so a re-rendered blueprint is only picked up on restart — hence the notify.
# Add an integration by dropping templates/blueprints/<name>.yaml.j2 and adding
# <name> to this loop.
- name: Render the authentik blueprints
  become: true
  ansible.builtin.template:
    src: "blueprints/{{ item }}.yaml.j2"
    dest: "{{ authentik_blueprints_dir }}/{{ item }}.yaml"
    owner: root
    group: root
    # Readable by the container's non-root user (mounted in); no secrets in the files.
    mode: "0644"
  loop:
    - headscale
    - core
    - recovery
    - invitation
    - nas
    - grafana
    - openbao
    - ldap
    - user
  notify: Restart authentik

- name: Render the Authentik env
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ authentik_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart authentik

- name: Render the Authentik compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ authentik_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart authentik

- name: Start Authentik (server + worker)
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_compose_dir }}"
    state: present
    pull: missing

# Bounce the outpost until it serves the CA-issued cert (SAN = this node's IP).
- name: Ensure the outpost serves the issued LDAPS cert
  become: true
  when: authentik_ldaps_pki_role | length > 0
  ansible.builtin.shell:
    cmd: >-
      docker compose restart ldap-outpost >/dev/null 2>&1; sleep 6;
      echo | openssl s_client -connect 127.0.0.1:636 2>/dev/null
      | openssl x509 -noout -ext subjectAltName
    chdir: "{{ authentik_compose_dir }}"
  register: authentik_ldaps_served
  changed_when: true
  until: ansible_default_ipv4.address in authentik_ldaps_served.stdout
  retries: 8
  delay: 12
