---
- name: Add Docker's official APT repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/debian"
    suites: "{{ ansible_distribution_release }}"
    components: [stable]
    signed_by: https://download.docker.com/linux/debian/gpg

# Debian's docker-compose-v2 isn't in the minimal Incus cloud image; Docker's own
# repo ships the engine + the compose v2 plugin reliably.
- name: Install Docker Engine + Compose v2 plugin
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create the Authentik compose directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0750"

- name: Create the blueprints directory
  become: true
  ansible.builtin.file:
    path: "{{ authentik_blueprints_dir }}"
    state: directory
    owner: root
    group: root
    # World-readable: the dir is bind-mounted into the container, which runs as a
    # non-root user that must read it to discover the blueprints. No secrets here
    # (the blueprint reads creds via !Env).
    mode: "0755"

# authentik file-watches the mounted dir and reconciles, so no restart is needed
# for a blueprint change once the volume's in place (the compose change below
# triggers the first recreate that mounts it).
- name: Render the Headscale OIDC blueprint
  become: true
  ansible.builtin.template:
    src: blueprints/headscale.yaml.j2
    dest: "{{ authentik_blueprints_dir }}/headscale.yaml"
    owner: root
    group: root
    # Readable by the container's non-root user (mounted in); no secret in the file.
    mode: "0644"

- name: Render the Authentik env
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ authentik_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart authentik

- name: Render the Authentik compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ authentik_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart authentik

- name: Start Authentik (server + worker)
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ authentik_compose_dir }}"
    state: present
    pull: missing
