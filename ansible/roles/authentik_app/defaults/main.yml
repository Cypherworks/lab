---
# Authentik app tier: server + worker only (the HA Postgres/Redis data tier is
# external, reached via the node-local HAProxy frontends at 127.0.0.1). One app
# node per cluster member; Caddy load-balances the servers.

# PIN to a confirmed current stable before apply — verify against
# https://github.com/goauthentik/authentik/releases (the registry tag must exist).
authentik_image: "ghcr.io/goauthentik/server:2025.6.4"

authentik_compose_dir: /opt/authentik
authentik_server_port: 9000

# Postgres/Redis via the node's local HAProxy frontends — reached on the node's
# lab IP (not loopback), because the containers run on the compose bridge, not
# host networking. ansible_default_ipv4.address is the app node's VLAN-30 address.
authentik_pg_host: "{{ ansible_default_ipv4.address }}"
authentik_pg_port: 5000
authentik_pg_name: authentik
authentik_pg_user: authentik

# Redis via the local HAProxy role:master frontend (Authentik has no Sentinel
# support, so it must see a single endpoint; Sentinel drives the failover).
authentik_redis_host: "{{ ansible_default_ipv4.address }}"
authentik_redis_port: 6379

# Secrets — from SOPS, never defaulted in real use:
#   authentik_secret_key, authentik_pg_password, authentik_redis_password
authentik_secret_key: ""
authentik_pg_password: ""
authentik_redis_password: ""
