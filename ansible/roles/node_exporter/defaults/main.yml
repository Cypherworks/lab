---
# node_exporter binds the host's lab address only; the lab network + host firewall
# gate access (metrics are not authenticated).
node_exporter_listen_address: "{{ ansible_default_ipv4.address }}"
node_exporter_port: 9100
# Collector set is the package default, which already includes hwmon + thermal_zone
# (CPU temperature on x86 and the Pis). Add/disable collectors here if needed.
node_exporter_extra_args: ""
