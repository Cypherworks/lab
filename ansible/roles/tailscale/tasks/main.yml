---
- name: Add the Tailscale apt repository
  become: true
  ansible.builtin.deb822_repository:
    name: tailscale
    types: [deb]
    uris: "https://pkgs.tailscale.com/stable/ubuntu"
    suites: "{{ ansible_distribution_release }}"
    components: [main]
    signed_by: "https://pkgs.tailscale.com/stable/ubuntu/{{ ansible_distribution_release }}.noarmor.gpg"

- name: Install Tailscale
  become: true
  ansible.builtin.apt:
    name: tailscale
    state: present
    update_cache: true

- name: Enable and start tailscaled
  become: true
  ansible.builtin.systemd_service:
    name: tailscaled
    enabled: true
    state: started

- name: Get the current Tailscale backend state
  become: true
  ansible.builtin.command: tailscale status --json
  register: tailscale_state
  changed_when: false
  failed_when: false

# Bring up only if not already Running, so re-runs don't churn the connection.
- name: Decide whether a join is needed
  ansible.builtin.set_fact:
    tailscale_needs_join: >-
      {{ tailscale_state.rc != 0 or
         ((tailscale_state.stdout | from_json).BackendState | default('')) != 'Running' }}

- name: Mint a pre-auth key from the control server
  become: true
  ansible.builtin.command: "{{ tailscale_authkey_command }}"
  register: tailscale_minted_key
  changed_when: false
  no_log: true
  when:
    - tailscale_needs_join | bool
    - tailscale_authkey_command | length > 0

- name: Select the pre-auth key for this join
  ansible.builtin.set_fact:
    tailscale_effective_authkey: >-
      {{ tailscale_minted_key.stdout_lines | last | trim
         if tailscale_authkey_command | length > 0
         else tailscale_authkey }}
  no_log: true
  when: tailscale_needs_join | bool

- name: Join the overlay
  become: true
  ansible.builtin.command: >-
    tailscale up
    --timeout {{ tailscale_up_timeout }}
    --login-server {{ tailscale_login_server }}
    --authkey {{ tailscale_effective_authkey }}
    {{ '--accept-routes' if tailscale_accept_routes else '' }}
    --hostname {{ tailscale_hostname }}
  register: tailscale_up
  changed_when: true
  no_log: true
  when: tailscale_needs_join | bool
