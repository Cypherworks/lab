---
- name: Set hostname
  become: true
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set timezone
  become: true
  community.general.timezone:
    name: "{{ timezone }}"

- name: Configure systemd-timesyncd NTP servers
  become: true
  ansible.builtin.template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart timesyncd

- name: Enable systemd-timesyncd
  become: true
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Authorise ops SSH keys for the ansible user
  become: true
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ ops_ssh_authorized_keys }}"

- name: Render the lab static-network config
  become: true
  ansible.builtin.template:
    src: lab-netplan.yaml.j2
    dest: /etc/netplan/60-lab.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan
