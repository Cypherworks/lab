---
- name: Set hostname
  become: true
  ansible.builtin.hostname:
    name: "{{ inventory_hostname }}"

- name: Install base packages
  become: true
  ansible.builtin.apt:
    name: "{{ base_packages }}"
    state: present
    update_cache: true
    cache_valid_time: 3600

- name: Set timezone
  become: true
  community.general.timezone:
    name: "{{ timezone }}"

# Time sync (NTP) is owned by the hardening layer: CIS 2.3.x enforces a single
# time daemon (chrony) and would remove anything base set up here. NTP servers
# are configured via ubtu24cis_time_pool/servers in the inventory.

- name: Authorise ops SSH keys for the ansible user
  become: true
  ansible.posix.authorized_key:
    user: "{{ ansible_user }}"
    key: "{{ item }}"
    state: present
  loop: "{{ ops_ssh_authorized_keys }}"

- name: Render the lab static-network config
  become: true
  ansible.builtin.template:
    src: lab-netplan.yaml.j2
    dest: /etc/netplan/60-lab.yaml
    owner: root
    group: root
    mode: "0600"
  notify: Apply netplan
