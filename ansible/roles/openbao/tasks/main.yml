---
# Install OpenBao from the pinned upstream .deb (same pattern as the headscale role).
# The package creates the openbao user/group, the systemd unit, /etc/openbao/, and a
# self-signed TLS cert under /opt/openbao/tls.
- name: Download the pinned OpenBao package
  become: true
  ansible.builtin.get_url:
    url: "{{ openbao_deb_url }}"
    dest: "/tmp/openbao_{{ openbao_version }}.deb"
    mode: "0644"

- name: Install OpenBao
  become: true
  ansible.builtin.apt:
    deb: "/tmp/openbao_{{ openbao_version }}.deb"

- name: Render the OpenBao auto-unseal credentials (systemd EnvironmentFile)
  become: true
  ansible.builtin.template:
    src: openbao.env.j2
    dest: /etc/openbao/openbao.env
    owner: root
    group: root
    mode: "0600"
  notify: Restart openbao

- name: Render the OpenBao config
  become: true
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: /etc/openbao/openbao.hcl
    owner: root
    group: openbao
    mode: "0640"
  notify: Restart openbao

# Starts uninitialised + sealed; `bao operator init` is a one-time manual step (it
# emits the recovery keys + root token to capture into the break-glass kit and SOPS).
# Once initialised, the awskms seal auto-unseals on every subsequent start.
- name: Enable and start OpenBao
  become: true
  ansible.builtin.systemd_service:
    name: openbao
    enabled: true
    state: started

# Resolve the management token that drives the reconcile: the provisioner AppRole if
# its creds are set (from SOPS), otherwise the bootstrap root token. This is what lets
# the standing root token be revoked once the AppRole is established.
- name: Log in with the provisioner AppRole
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_SKIP_VERIFY: "true"
  ansible.builtin.command:
    argv:
      - bao
      - write
      - -field=token
      - auth/approle/login
      - "role_id={{ openbao_provisioner_role_id }}"
      - "secret_id={{ openbao_provisioner_secret_id }}"
  register: openbao_provisioner_login
  changed_when: false
  no_log: true
  when:
    - openbao_provisioner_role_id | length > 0
    - openbao_provisioner_secret_id | length > 0

- name: Select the management token (provisioner AppRole, else the bootstrap root token)
  ansible.builtin.set_fact:
    openbao_mgmt_token: "{{ openbao_provisioner_login.stdout if (openbao_provisioner_login is not skipped) else openbao_root_token }}"
  no_log: true

# Provisioner AppRole + policy — the non-root identity everything below authenticates
# as. Written with the root token on first bootstrap, self-maintaining thereafter.
- name: Configure the provisioner AppRole + policy
  ansible.builtin.include_tasks: provisioner.yml
  when: openbao_mgmt_token | length > 0

# The reconcile runs once OpenBao is initialised and a management token is available
# (from the step above); the manual `bao operator init` must have happened first.
- name: Reconcile the PKI engine
  ansible.builtin.include_tasks: pki.yml
  when: openbao_mgmt_token | length > 0

# Swap the self-signed bootstrap listener cert for one issued by the internal CA,
# once the PKI + an issuing role exist. Guarded (one-shot) inside the task file.
- name: Install the listener cert from the internal PKI
  ansible.builtin.include_tasks: listener_cert.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_listener_cert_role | length > 0

# Human login via Authentik OIDC (machine auth stays on AppRole/token).
- name: Configure OIDC login
  ansible.builtin.include_tasks: oidc.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_oidc_enabled | bool

# Daily raft snapshots to S3 (AppRole-authed) for DR.
- name: Configure raft snapshots
  ansible.builtin.include_tasks: snapshots.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_snapshot_enabled | bool

# SSH CA — signs short-lived user certs (hosts trust it via TrustedUserCAKeys).
- name: Configure the SSH CA
  ansible.builtin.include_tasks: ssh.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_ssh_enabled | bool
