---
# Install OpenBao from the pinned upstream .deb (same pattern as the headscale role).
# The package creates the openbao user/group, the systemd unit, /etc/openbao/, and a
# self-signed TLS cert under /opt/openbao/tls.
- name: Download the pinned OpenBao package
  become: true
  ansible.builtin.get_url:
    url: "{{ openbao_deb_url }}"
    dest: "/tmp/openbao_{{ openbao_version }}.deb"
    mode: "0644"

- name: Install OpenBao
  become: true
  ansible.builtin.apt:
    deb: "/tmp/openbao_{{ openbao_version }}.deb"

# Hold it so unattended-upgrades can never change or autoremove the root-of-trust package
# (the incus outage showed what an unexpected package change does). Manually-installed
# pinned .deb, not in an apt repo, so low-risk — belt-and-braces.
- name: Hold the OpenBao package
  become: true
  ansible.builtin.dpkg_selections:
    name: openbao
    selection: hold

- name: Render the OpenBao auto-unseal credentials (systemd EnvironmentFile)
  become: true
  ansible.builtin.template:
    src: openbao.env.j2
    dest: /etc/openbao/openbao.env
    owner: root
    group: root
    mode: "0600"
  notify: Restart openbao

- name: Render the OpenBao config
  become: true
  ansible.builtin.template:
    src: openbao.hcl.j2
    dest: /etc/openbao/openbao.hcl
    owner: root
    group: openbao
    mode: "0640"
  notify: Restart openbao

# The declarative `audit "file"` stanza opens this log as OpenBao starts, so the dir
# must exist and be writable by the openbao user beforehand — otherwise the only audit
# device fails and OpenBao won't serve.
- name: Ensure the audit log directory exists
  become: true
  ansible.builtin.file:
    path: "{{ openbao_audit_log_dir }}"
    state: directory
    owner: openbao
    group: openbao
    mode: "0750"
  when: openbao_audit_enabled | bool

# Starts uninitialised + sealed on a fresh node; the awskms seal auto-unseals on every
# subsequent start once initialised.
- name: Enable and start OpenBao
  become: true
  ansible.builtin.systemd_service:
    name: openbao
    enabled: true
    state: started

# Zero-touch init (auto_init); else a human bao operator init + SOPS creds.
- name: Initialise OpenBao and resolve its bootstrap state
  ansible.builtin.include_tasks: init.yml
  when: openbao_auto_init | bool

# Mgmt token: provisioner AppRole if its creds are set, else bootstrap root.
# Skipped on a first-init run (bootstrap root defined) — the AppRole auth method
# isn't enabled until provisioner.yml below, so an AppRole login can't work yet.
- name: Log in with the provisioner AppRole
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_SKIP_VERIFY: "true"
  ansible.builtin.command:
    argv:
      - bao
      - write
      - -field=token
      - auth/approle/login
      - "role_id={{ openbao_provisioner_role_id }}"
      - "secret_id={{ openbao_provisioner_secret_id }}"
  register: openbao_provisioner_login
  changed_when: false
  no_log: true
  when:
    - openbao_bootstrap_root_token is not defined
    - openbao_provisioner_role_id | length > 0
    - openbao_provisioner_secret_id | length > 0

- name: Select the management token (provisioner AppRole, else the bootstrap root token)
  ansible.builtin.set_fact:
    openbao_mgmt_token: >-
      {{ openbao_provisioner_login.stdout
         if (openbao_provisioner_login is not skipped)
         else (openbao_bootstrap_root_token | default(openbao_root_token)) }}
  no_log: true

# Provisioner AppRole + policy — the non-root identity everything below authenticates
# as. Written with the root token on first bootstrap, self-maintaining thereafter.
- name: Configure the provisioner AppRole + policy
  ansible.builtin.include_tasks: provisioner.yml
  when: openbao_mgmt_token | length > 0

# First auto-init only: persist the new AppRole creds to SSM for later runs.
- name: Persist the provisioner creds after first init
  ansible.builtin.include_tasks: finalize_init.yml
  when:
    - openbao_auto_init | bool
    - openbao_bootstrap_root_token is defined

# The file audit device is declared in openbao.hcl and enabled at boot, so everything
# the reconcile writes below is already logged. Verify it's live and set up rotation.
- name: Verify the audit device and configure log rotation
  ansible.builtin.include_tasks: audit.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_audit_enabled | bool

# The reconcile runs once OpenBao is initialised and a management token is available
# (from the step above); the manual `bao operator init` must have happened first.
- name: Reconcile the PKI engine
  ansible.builtin.include_tasks: pki.yml
  when: openbao_mgmt_token | length > 0

# Swap the self-signed bootstrap listener cert for one issued by the internal CA,
# once the PKI + an issuing role exist. Guarded (one-shot) inside the task file.
- name: Install the listener cert from the internal PKI
  ansible.builtin.include_tasks: listener_cert.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_listener_cert_role | length > 0

# Human login via Authentik OIDC (machine auth stays on AppRole/token).
- name: Configure OIDC login
  ansible.builtin.include_tasks: oidc.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_oidc_enabled | bool

# Daily raft snapshots to S3 (AppRole-authed) for DR.
- name: Configure raft snapshots
  ansible.builtin.include_tasks: snapshots.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_snapshot_enabled | bool

# SSH CA — signs short-lived user certs (hosts trust it via TrustedUserCAKeys).
- name: Configure the SSH CA
  ansible.builtin.include_tasks: ssh.yml
  when:
    - openbao_mgmt_token | length > 0
    - openbao_ssh_enabled | bool

# First-init only: revoke root; break-glass regenerates it from recovery.
- name: Revoke the bootstrap root token
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_bootstrap_root_token }}"
    BAO_SKIP_VERIFY: "true"
  ansible.builtin.command: bao token revoke -self
  when:
    - openbao_auto_init | bool
    - openbao_bootstrap_root_token is defined
  changed_when: true
  no_log: true
