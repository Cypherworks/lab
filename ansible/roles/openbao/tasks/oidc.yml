---
# Human login via Authentik OIDC. Idempotent: policies and the config/role writes
# are safe to re-apply; enabling the auth method tolerates "already in use". All
# commands use the root token from SOPS.
- name: Configure OpenBao OIDC (Authentik)
  environment:
    BAO_ADDR: "{{ openbao_api_addr }}"
    BAO_TOKEN: "{{ openbao_mgmt_token }}"
    BAO_SKIP_VERIFY: "true"
  block:
    - name: Write the ACL policies
      ansible.builtin.command:
        cmd: "bao policy write {{ item.name }} -"
        stdin: "{{ item.rules }}"
      loop: "{{ openbao_policies }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    - name: Enable the OIDC auth method
      ansible.builtin.command:
        cmd: "bao auth enable oidc"
      register: openbao_oidc_enable
      changed_when: openbao_oidc_enable.rc == 0
      failed_when:
        - openbao_oidc_enable.rc != 0
        - "'path is already in use' not in openbao_oidc_enable.stderr"

    - name: Write the OIDC config
      ansible.builtin.command:
        argv:
          - bao
          - write
          - auth/oidc/config
          - "oidc_discovery_url={{ openbao_oidc_discovery_url }}"
          - "oidc_client_id={{ openbao_oidc_client_id }}"
          - "oidc_client_secret={{ openbao_oidc_client_secret }}"
          - "default_role={{ openbao_oidc_default_role }}"
      changed_when: true
      no_log: true

    - name: Write the OIDC login roles
      ansible.builtin.command:
        argv:
          - bao
          - write
          - "auth/oidc/role/{{ item.name }}"
          - "role_type=oidc"
          - "user_claim={{ item.user_claim | default('sub') }}"
          - "groups_claim={{ item.groups_claim | default('groups') }}"
          - "oidc_scopes={{ item.oidc_scopes | default('profile,email') }}"
          - "allowed_redirect_uris={{ item.allowed_redirect_uris | join(',') }}"
          - "token_policies={{ item.token_policies | join(',') }}"
          - "ttl={{ item.ttl | default('1h') }}"
      loop: "{{ openbao_oidc_roles }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: true

    # Map IdP groups to policies via external identity groups. A member of the group
    # gets its policies attached automatically on `bao login -method=oidc` (the login
    # role's groups_claim carries the groups) — no role selection, no per-user config.
    - name: Look up the OIDC auth accessor
      ansible.builtin.command: bao auth list -format=json
      register: openbao_oidc_auth_list
      changed_when: false
      when: openbao_oidc_group_policies | length > 0

    - name: Create the external identity groups
      ansible.builtin.command:
        cmd: "bao write identity/group name={{ item.group }} type=external policies={{ item.policies | join(',') }}"
      loop: "{{ openbao_oidc_group_policies }}"
      loop_control:
        label: "{{ item.group }}"
      changed_when: true

    - name: Read each identity group back (for its id + any existing alias)
      ansible.builtin.command: "bao read -format=json identity/group/name/{{ item.group }}"
      register: openbao_oidc_group_read
      loop: "{{ openbao_oidc_group_policies }}"
      loop_control:
        label: "{{ item.group }}"
      changed_when: false

    # Create the alias linking the IdP group name to the OpenBao group, only when the
    # group has none yet — writing an alias each run would create duplicates.
    - name: Alias the IdP group to the OpenBao identity group (once)
      ansible.builtin.command:
        cmd: >-
          bao write identity/group-alias
          name={{ item.item.group }}
          mount_accessor={{ (openbao_oidc_auth_list.stdout | from_json)['oidc/'].accessor }}
          canonical_id={{ (item.stdout | from_json).data.id }}
      when: not ((item.stdout | from_json).data.alias.id | default(''))
      loop: "{{ openbao_oidc_group_read.results }}"
      loop_control:
        label: "{{ item.item.group }}"
      changed_when: true
