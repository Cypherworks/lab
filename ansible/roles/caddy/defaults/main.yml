---
# Reverse-proxy ingress config. Caddy itself is installed by the Terraform incus
# instance (cloud-init); this role owns the Caddyfile so routes change with an
# Ansible run + reload, never an instance rebuild.

caddy_domain: example.com
caddy_acme_email: admin@example.com
caddy_config_path: /etc/caddy/Caddyfile
caddy_binary: /usr/local/bin/caddy

# One wildcard cert (Route53 DNS-01) covers every host below. Add/remove a service
# by editing this list (in group_vars) and re-running — the reload is sub-second.
# Each entry: name (matcher id), host (FQDN), and either upstream (single backend)
# or upstreams (a list, load-balanced). Optional: lb_policy (default round_robin
# when >1 upstream), health_uri + health_interval for active health checks,
# tls_skip_verify for self-signed backends, and a header_up map to rewrite headers
# sent upstream (e.g. UniFi rejects a proxied Origin/Host).
caddy_routes: []

# Raw TCP (layer4) passthrough proxies — needs the caddy-l4 plugin in the binary.
# No TLS termination, so mutual-TLS backends and cert-pinning clients work through
# it. Each entry: port, upstreams (list of host:port), lb_policy (default
# round_robin), health_interval (default 5s). Empty omits the layer4 block.
caddy_l4_proxies: []

# Extra CA certificates to trust for verifying internal HTTPS upstreams (e.g. the
# OpenBao internal CA), so those routes can verify the backend instead of using
# tls_skip_verify. A map of name -> PEM content; installed into the system trust
# store. Supplied by the deploy (the CA cert is public, but site-specific).
caddy_trusted_ca_certs: {}
