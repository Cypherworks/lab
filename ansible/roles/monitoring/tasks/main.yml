---
# Docker itself comes from the shared `docker` role (meta dependency).
- name: Create the monitoring directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_compose_dir }}"
    - "{{ monitoring_config_dir }}"
    - "{{ monitoring_config_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_config_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_config_dir }}/grafana/dashboards"

- name: Render the monitoring config files
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_config_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: scrape.yml.j2, dest: scrape.yml }
    - { src: alert-rules.yml.j2, dest: alert-rules.yml }
    - { src: alertmanager.yml.j2, dest: alertmanager.yml }
    - { src: ntfy.yml.j2, dest: ntfy.yml }
    - { src: ntfy-alert.yml.j2, dest: ntfy-alert.yml }
    - { src: blackbox.yml.j2, dest: blackbox.yml }
    - { src: snmp.yml.j2, dest: snmp.yml }
    - { src: go2rtc.yaml.j2, dest: go2rtc.yaml }
    - { src: grafana-datasource.yml.j2, dest: grafana/provisioning/datasources/datasource.yml }
    - { src: grafana-dashboards.yml.j2, dest: grafana/provisioning/dashboards/dashboards.yml }
    - { src: dashboards/lab-overview.json.j2, dest: grafana/dashboards/lab-overview.json }
  notify: Restart monitoring

- name: Remove dropped provisioned dashboards
  become: true
  ansible.builtin.file:
    path: "{{ monitoring_config_dir }}/grafana/dashboards/{{ item }}"
    state: absent
  loop:
    - cctv.json
    - lab-services-nas.json
  notify: Restart monitoring

- name: Render the HASS scrape token (0600 — docker-secret source for vmsingle)
  become: true
  ansible.builtin.template:
    src: hass_token.j2
    dest: "{{ monitoring_config_dir }}/hass_token"
    owner: root
    group: root
    mode: "0600"
  when: monitoring_hass_token | length > 0
  notify: Restart monitoring

- name: Render the monitoring env (secrets)
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ monitoring_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart monitoring

- name: Render the monitoring compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ monitoring_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0600"
  notify: Restart monitoring

- name: Start the monitoring stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_compose_dir }}"
    state: present
    pull: missing

# ntfy auth: deny-all by default, so provision the publisher + subscriber users and
# their topic ACLs. Idempotent — re-adding an existing user is tolerated: the add
# returns "already exists", which failed_when treats as success rather than an error.
- name: Wait for ntfy to be ready
  become: true
  ansible.builtin.command:
    cmd: "docker compose -f {{ monitoring_compose_dir }}/compose.yaml exec -T ntfy ntfy user list"
  register: monitoring_ntfy_users
  retries: 10
  delay: 3
  until: monitoring_ntfy_users.rc == 0
  changed_when: false

- name: Create the ntfy users
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ monitoring_compose_dir }}/compose.yaml"
      - exec
      - -T
      - -e
      - "NTFY_PASSWORD={{ item.password }}"
      - ntfy
      - ntfy
      - user
      - add
      - "{{ item.name }}"
  loop:
    - { name: alertmanager, password: "{{ monitoring_ntfy_alertmanager_password }}" }
    - { name: "{{ monitoring_ntfy_user }}", password: "{{ monitoring_ntfy_user_password }}" }
  loop_control:
    label: "{{ item.name }}"
  register: monitoring_ntfy_useradd
  changed_when: monitoring_ntfy_useradd.rc == 0
  failed_when: monitoring_ntfy_useradd.rc != 0 and 'already exists' not in monitoring_ntfy_useradd.stderr
  no_log: true

- name: Set the ntfy topic ACLs (least privilege)
  become: true
  ansible.builtin.command:
    cmd: "docker compose -f {{ monitoring_compose_dir }}/compose.yaml exec -T ntfy ntfy access {{ item.user }} {{ monitoring_ntfy_topic }} {{ item.perm }}"
  loop:
    - { user: alertmanager, perm: write-only }
    - { user: "{{ monitoring_ntfy_user }}", perm: read-only }
  loop_control:
    label: "{{ item.user }}"
  changed_when: false
