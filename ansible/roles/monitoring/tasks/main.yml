---
# Mirrors the authentik_app pattern: Docker from the official repo, then a compose
# stack. (A shared 'docker' role would DRY the install across both — noted, not
# done here.)
- name: Add Docker's official APT repository
  become: true
  ansible.builtin.deb822_repository:
    name: docker
    types: [deb]
    uris: "https://download.docker.com/linux/debian"
    suites: "{{ ansible_distribution_release }}"
    components: [stable]
    signed_by: https://download.docker.com/linux/debian/gpg

- name: Install Docker Engine + Compose v2 plugin
  become: true
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Create the monitoring directories
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  loop:
    - "{{ monitoring_compose_dir }}"
    - "{{ monitoring_config_dir }}"
    - "{{ monitoring_config_dir }}/grafana/provisioning/datasources"
    - "{{ monitoring_config_dir }}/grafana/provisioning/dashboards"
    - "{{ monitoring_config_dir }}/grafana/dashboards"

- name: Render the monitoring config files
  become: true
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_config_dir }}/{{ item.dest }}"
    owner: root
    group: root
    mode: "0644"
  loop:
    - { src: scrape.yml.j2, dest: scrape.yml }
    - { src: alert-rules.yml.j2, dest: alert-rules.yml }
    - { src: alertmanager.yml.j2, dest: alertmanager.yml }
    - { src: am-ntfy.yml.j2, dest: am-ntfy.yml }
    - { src: ntfy.yml.j2, dest: ntfy.yml }
    - { src: grafana-datasource.yml.j2, dest: grafana/provisioning/datasources/datasource.yml }
    - { src: grafana-dashboards.yml.j2, dest: grafana/provisioning/dashboards/dashboards.yml }
    - { src: dashboards/lab-overview.json.j2, dest: grafana/dashboards/lab-overview.json }
  notify: Restart monitoring

- name: Render the monitoring env (secrets)
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ monitoring_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart monitoring

- name: Render the monitoring compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ monitoring_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0640"
  notify: Restart monitoring

- name: Start the monitoring stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_compose_dir }}"
    state: present
    pull: missing
