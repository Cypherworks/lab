---
# Observability stack on one monitoring Incus instance, via docker compose:
# VictoriaMetrics (vmsingle) for storage + scraping, vmalert for rules, Alertmanager
# posting to a self-hosted ntfy via ntfy's built-in alertmanager template, and Grafana.
# vmsingle over Prometheus deliberately — lighter + better compaction on the
# resource/heat-constrained rig. PromQL-compatible, so Grafana treats it as a
# Prometheus datasource.

monitoring_compose_dir: /opt/monitoring
monitoring_data_dir: "{{ monitoring_compose_dir }}/data"
monitoring_config_dir: "{{ monitoring_compose_dir }}/config"

# Pin to confirmed-current stable tags before apply (registry tag must exist).
monitoring_vmsingle_image: "victoriametrics/victoria-metrics:v1.102.1"
monitoring_vmalert_image: "victoriametrics/vmalert:v1.102.1"
monitoring_alertmanager_image: "prom/alertmanager:v0.27.0"
monitoring_grafana_image: "grafana/grafana:11.2.0"
monitoring_ntfy_image: "binwiederhier/ntfy:v2.26.0"
monitoring_redis_exporter_image: "oliver006/redis_exporter:v1.62.0"
monitoring_blackbox_image: "prom/blackbox-exporter:v0.25.0"
monitoring_snmp_exporter_image: "prom/snmp-exporter:v0.26.0"
monitoring_go2rtc_image: "alexxit/go2rtc:1.9.14"
monitoring_victorialogs_image: "victoriametrics/victoria-logs:v1.51.0"

monitoring_retention: "30d"          # modest, given constrained storage
monitoring_logs_retention: "30d"     # VictoriaLogs retention, same constrained budget
monitoring_scrape_interval: "30s"

# Anonymous view-only access, for the wall kiosk. Off by default; the deploy
# enables it. Admin/edit stays behind Authentik OIDC.
monitoring_grafana_anonymous_enabled: false

# Scrape targets supplied by the deploy from inventory (no IPs in the role). Each
# entry is a {target: "ip:port", instance: "hostname"} mapping so the scraped series
# carry the real hostname as their `instance` label (dashboards read hostnames, not
# IPs). An empty list omits that job.
monitoring_node_targets: []          # node_exporter on the bare-metal hosts (:9100)
monitoring_blocky_targets: []        # blocky /metrics (:4000)
monitoring_patroni_targets: []       # Patroni REST /metrics (:8008)
monitoring_etcd_targets: []          # etcd /metrics (:2379)
monitoring_redis_targets: []         # redis endpoints (:6379) via redis_exporter
monitoring_speedtest_targets: []     # speedtest-tracker native /prometheus (:8080)

# blackbox_exporter https probes (cert expiry). Plain list of https URLs; the URL
# becomes the `instance` label (blackbox standard pattern).
monitoring_blackbox_targets: []      # e.g. ["https://grafana.example.com"]

# snmp_exporter targets — the Synology NAS over SNMPv3. {target: "ip:161", instance}.
monitoring_snmp_targets: []

# Incus cluster metrics (/1.0/metrics) over mTLS — per-instance CPU/mem/disk/net/
# state. {target: "member-ip:8444", instance: member}. Empty omits the job. The
# cert+key are the TF-generated metrics scraper keypair (mounted as docker secrets).
monitoring_incus_metrics_targets: []
monitoring_incus_metrics_cert: ""
monitoring_incus_metrics_key: ""

# Headscale control-plane /metrics, reached over the overlay. "tailnet-ip:9090".
monitoring_headscale_target: ""

# Home Assistant Prometheus scrape, via Caddy (TLS). Target is the Caddy host
# (host:443). The bearer token is a SOPS secret, injected via the container env and
# expanded by vmsingle (%{HASS_TOKEN}) — never written to the on-disk scrape config.
monitoring_hass_target: ""           # e.g. hass.example.com:443
monitoring_hass_token: ""            # SOPS — HASS long-lived access token

# Alert thresholds — tunable from the deploy.
monitoring_temp_warn_celsius: 75
monitoring_disk_used_percent: 85

# Grafana — site values from the deploy. OIDC endpoints are authentik's GLOBAL
# ones (not per-app); verified against integrations.goauthentik.io/monitoring/grafana.
monitoring_grafana_root_url: ""              # https://grafana.example.com
monitoring_grafana_admin_user: "admin"
monitoring_grafana_oidc_auth_url: ""         # https://auth.cw/application/o/authorize/
monitoring_grafana_oidc_token_url: ""        # https://auth.cw/application/o/token/
monitoring_grafana_oidc_api_url: ""          # https://auth.cw/application/o/userinfo/
monitoring_grafana_oidc_signout_url: ""      # https://auth.cw/application/o/grafana/end-session/
# Map authentik groups → Grafana roles. grafana-admins → Admin, everyone else
# (i.e. grafana-users, who are the only ones the app lets in) → Editor.
monitoring_grafana_role_path: "contains(groups[*], 'grafana-admins') && 'Admin' || 'Editor'"

# ntfy
monitoring_ntfy_base_url: ""                 # public base URL ntfy serves on
monitoring_ntfy_topic: "lab-alerts"
monitoring_ntfy_user: ""                     # human username (web UI + phone app), from deploy
# Relays a wake-up push through ntfy.sh's APNS/FCM so the phone app gets INSTANT
# notifications from a self-hosted server (iOS can't hold a background connection).
# Only a poll trigger is sent upstream — message content never leaves the lab. Set to
# "" to disable (Android can instead use the app's per-topic "instant delivery").
monitoring_ntfy_upstream_base_url: "https://ntfy.sh"
# Alert notification priority + tags (ntfy). high = sound/vibrate so it isn't missed.
monitoring_ntfy_alert_priority: "high"
monitoring_ntfy_alert_tags: "warning"
# How often Alertmanager re-notifies an alert that is still firing. 24h so an ongoing
# outage (e.g. a host down) reminds once a day rather than every few hours.
monitoring_alertmanager_repeat_interval: "24h"

# Secrets — from SOPS (deploy), never defaulted in real use.
monitoring_grafana_admin_password: ""
monitoring_grafana_oidc_client_id: ""
monitoring_grafana_oidc_client_secret: ""
monitoring_redis_password: ""
monitoring_ntfy_alertmanager_password: ""    # alertmanager ntfy user (publish to the topic)
monitoring_ntfy_user_password: ""            # human ntfy user (subscribe)

# SNMPv3 (authPriv) creds for the Synology NAS — from SOPS (deploy). The DSM side
# uses SHA auth + AES privacy (set explicitly on both ends).
monitoring_snmp_v3_username: ""
monitoring_snmp_v3_auth_password: ""         # SNMPv3 auth password
monitoring_snmp_v3_priv_password: ""         # SNMPv3 privacy (encryption) password
monitoring_snmp_v3_auth_protocol: "SHA"
monitoring_snmp_v3_priv_protocol: "AES"

# go2rtc CCTV restream. The two RTSP source URLs carry Scrypted access tokens, so
# they are SECRETS — supplied by the deploy from SOPS, expanded from the container
# env into go2rtc.yaml at load time (never written plaintext to the on-disk config).
# go2rtc listens on one HTTP port (MSE/HLS/UI); Caddy fronts it on the lab domain and
# the embed plays MSE (pure HTTP/WS, proxies cleanly). WebRTC would need direct
# UDP/TCP 8555 so it's left for on-LAN use only — not published here.
monitoring_go2rtc_api_port: 1984
# Transcode camera video to H.264 (for H.265 cameras — browser MSE needs H.264).
# Software transcode via go2rtc's ffmpeg, so it costs CPU on the monitoring host.
monitoring_go2rtc_video_transcode: false
monitoring_go2rtc_front_url: ""              # rtsp://...  (SOPS — has an access token)
monitoring_go2rtc_garage_carport_url: ""    # rtsp://...  (SOPS — has an access token)
# Optional go2rtc Basic auth. Left empty by default: the auth boundary is Caddy TLS +
# lab-only reachability + Grafana's Authentik OIDC. Enabling it would make the browser
# prompt for credentials inside the iframe, breaking the seamless embed. Set both to
# turn it on for direct (non-embed) access.
monitoring_go2rtc_username: ""
monitoring_go2rtc_password: ""
# Browser-facing go2rtc base URL (Caddy front, lab domain) that the Grafana CCTV
# iframe points at. The user's browser loads this, so it must be the Caddy route, not
# the internal compose port. Set from the deploy (e.g. https://cctv.example.com).
monitoring_go2rtc_public_url: ""

# Home Assistant power/energy sensor entity IDs for the lab-overview power matrix
# (now W + today/week/month kWh, per location). Site-specific — set from the deploy;
# empty leaves those blocks with no data. Kept out of this public repo on purpose.
monitoring_power_sensors:
  rack_now: ""
  rack_day: ""
  rack_month: ""
  desk_now: ""
  desk_day: ""
  desk_month: ""
  office_now: ""
  office_day: ""
  office_month: ""
