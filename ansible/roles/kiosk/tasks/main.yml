---
# Resolve a Grafana playlist to its play URL by name — the UID is generated, so
# looking it up survives rebuilds. Runs on the Pi, which reaches Grafana via Caddy
# (anonymous view). Retries while Grafana/the playlist come up.
- name: Resolve the Grafana playlist into a kiosk URL
  when: kiosk_grafana_playlist_name | length > 0
  block:
    - name: Look up the playlist by name
      ansible.builtin.uri:
        url: "{{ kiosk_grafana_url }}/api/playlists?query={{ kiosk_grafana_playlist_name | urlencode }}"
        return_content: true
      register: _kiosk_playlists
      until:
        - _kiosk_playlists.status == 200
        - (_kiosk_playlists.json | selectattr('name', 'equalto', kiosk_grafana_playlist_name) | list | length) > 0
      retries: 10
      delay: 6

    - name: Build the kiosk URL from the playlist UID
      ansible.builtin.set_fact:
        kiosk_url: "{{ kiosk_grafana_url }}/playlists/play/{{ (_kiosk_playlists.json | selectattr('name', 'equalto', kiosk_grafana_playlist_name) | first).uid }}?kiosk"

- name: Require the kiosk URL
  ansible.builtin.assert:
    that: kiosk_url | length > 0
    fail_msg: "Set kiosk_url, or kiosk_grafana_url + kiosk_grafana_playlist_name."

# greetd manages the seat/VT/logind session and launches cage — the reliable way
# to autostart a Wayland kiosk without a full display manager.
- name: Install the kiosk stack (greetd + cage + output control + fonts)
  become: true
  ansible.builtin.apt:
    name:
      - greetd
      - cage
      - wlr-randr
      - fonts-noto-core
      - ca-certificates
    state: present
    update_cache: true

- name: Install Chromium (snap on Ubuntu 24.04)
  become: true
  community.general.snap:
    name: chromium

- name: Create the kiosk user (local, no shell login)
  become: true
  ansible.builtin.user:
    name: "{{ kiosk_user }}"
    groups: [video, render, input]
    append: true
    shell: /usr/sbin/nologin
    create_home: true

- name: Render the cage launcher (sets the renderer, then runs cage)
  become: true
  ansible.builtin.template:
    src: kiosk-launch.sh.j2
    dest: /usr/local/bin/kiosk-launch
    owner: root
    group: root
    mode: "0755"
  notify: Restart greetd

- name: Render the cage session (output mode, then Chromium)
  become: true
  ansible.builtin.template:
    src: kiosk-session.sh.j2
    dest: /usr/local/bin/kiosk-session
    owner: root
    group: root
    mode: "0755"
  notify: Restart greetd

- name: Configure greetd to autostart the kiosk on VT1
  become: true
  ansible.builtin.template:
    src: greetd.toml.j2
    dest: /etc/greetd/config.toml
    owner: root
    group: root
    mode: "0644"
  notify: Restart greetd

# The role used to ship a hand-rolled kiosk.service; greetd replaces it. Stop and
# remove it (and any drop-ins) so the two don't fight for VT1.
- name: Stop the old hand-rolled kiosk service
  become: true
  ansible.builtin.systemd:
    name: kiosk.service
    state: stopped
    enabled: false
  failed_when: false

- name: Remove the old kiosk unit and drop-ins
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  loop:
    - /etc/systemd/system/kiosk.service
    - /etc/systemd/system/kiosk.service.d

# greetd owns VT1, so the console getty must not fight it for the tty.
- name: Disable the console getty on VT1 (greetd owns it)
  become: true
  ansible.builtin.systemd:
    name: getty@tty1.service
    enabled: false
    masked: true

- name: Enable greetd
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: true
    daemon_reload: true
    state: started
