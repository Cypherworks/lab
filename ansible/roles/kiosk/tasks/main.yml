---
# Resolve a Grafana playlist to its play URL by name — the UID is generated, so
# looking it up survives rebuilds. Runs on the Pi, which reaches Grafana via Caddy
# (anonymous view). Retries while Grafana/the playlist come up.
- name: Resolve the Grafana playlist into a kiosk URL
  when: kiosk_grafana_playlist_name | length > 0
  block:
    - name: Look up the playlist by name
      ansible.builtin.uri:
        url: "{{ kiosk_grafana_url }}/api/playlists?query={{ kiosk_grafana_playlist_name | urlencode }}"
        return_content: true
      register: _kiosk_playlists
      until:
        - _kiosk_playlists.status == 200
        - (_kiosk_playlists.json | selectattr('name', 'equalto', kiosk_grafana_playlist_name) | list | length) > 0
      retries: 10
      delay: 6

    - name: Build the kiosk URL from the playlist UID
      ansible.builtin.set_fact:
        kiosk_url: "{{ kiosk_grafana_url }}/playlists/play/{{ (_kiosk_playlists.json | selectattr('name', 'equalto', kiosk_grafana_playlist_name) | first).uid }}?kiosk"

- name: Require the kiosk URL
  ansible.builtin.assert:
    that: kiosk_url | length > 0
    fail_msg: "Set kiosk_url, or kiosk_grafana_url + kiosk_grafana_playlist_name."

# X11 + Chromium: the long-proven Pi kiosk stack. A getty autologin on tty1 starts
# X from the kiosk user's shell profile, which launches Chromium fullscreen.
- name: Install the X11 kiosk stack
  become: true
  ansible.builtin.apt:
    name:
      - xserver-xorg
      - xinit
      - x11-xserver-utils     # xset (blanking), xrandr (mode)
      - fonts-noto-core
      - ca-certificates
    state: present
    update_cache: true

- name: Install Chromium (snap on Ubuntu 24.04)
  become: true
  community.general.snap:
    name: chromium

- name: Create the kiosk user (console autologin, so a real shell)
  become: true
  ansible.builtin.user:
    name: "{{ kiosk_user }}"
    groups: [video, render, input, tty]
    append: true
    shell: /bin/bash
    create_home: true

- name: Allow the console user to start X (Xorg wrapper)
  become: true
  ansible.builtin.copy:
    dest: /etc/X11/Xwrapper.config
    content: |
      allowed_users=anybody
      needs_root_rights=yes
    owner: root
    group: root
    mode: "0644"
  notify: Restart kiosk getty

- name: Unmask the tty1 getty (an earlier greetd attempt may have masked it)
  become: true
  ansible.builtin.systemd:
    name: getty@tty1.service
    masked: false

- name: Ensure the tty1 getty drop-in directory exists
  become: true
  ansible.builtin.file:
    path: /etc/systemd/system/getty@tty1.service.d
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Autologin the kiosk user on tty1
  become: true
  ansible.builtin.template:
    src: getty-autologin.conf.j2
    dest: /etc/systemd/system/getty@tty1.service.d/autologin.conf
    owner: root
    group: root
    mode: "0644"
  notify: Restart kiosk getty

- name: Start X on the kiosk user's tty1 login (shell profile)
  become: true
  ansible.builtin.template:
    src: bash_profile.j2
    dest: "/home/{{ kiosk_user }}/.bash_profile"
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: "0644"
  notify: Restart kiosk getty

- name: Render the X session (.xinitrc)
  become: true
  ansible.builtin.template:
    src: xinitrc.j2
    dest: "/home/{{ kiosk_user }}/.xinitrc"
    owner: "{{ kiosk_user }}"
    group: "{{ kiosk_user }}"
    mode: "0755"
  notify: Restart kiosk getty

# Undo an earlier greetd/cage attempt if present, and make sure the tty1 getty
# (now carrying the autologin) is enabled.
- name: Remove any greetd config from the earlier attempt
  become: true
  ansible.builtin.file:
    path: /etc/greetd/config.toml
    state: absent

- name: Disable greetd (X11 uses the tty1 getty instead)
  become: true
  ansible.builtin.systemd:
    name: greetd.service
    enabled: false
    state: stopped
  failed_when: false

- name: Ensure the tty1 getty is enabled and unmasked
  become: true
  ansible.builtin.systemd:
    name: getty@tty1.service
    enabled: true
    masked: false
    daemon_reload: true
  notify: Restart kiosk getty
