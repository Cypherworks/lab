---
# Pinned ≥ 0.26 — that's where HA subnet-router failover was fixed (LP #2228).
headscale_version: "0.26.1"
headscale_arch: arm64
headscale_release_base: "https://github.com/juanfont/headscale/releases/download/v{{ headscale_version }}"
headscale_deb_name: "headscale_{{ headscale_version }}_linux_{{ headscale_arch }}.deb"
headscale_deb_url: "{{ headscale_release_base }}/{{ headscale_deb_name }}"
# Integrity check for the .deb, verified against Headscale's own published checksums
# file (get_url fetches it and matches on the package filename). Override with a
# literal "sha256:<hash>" to pin, or set to "" to skip verification.
headscale_checksum: "sha256:{{ headscale_release_base }}/checksums.txt"

headscale_domain: headscale.example.com
# Standalone default is the public 443. Behind the EC2 sni_router, override this to
# a local port (e.g. 127.0.0.1:8443) so nginx ssl_preread can front 443 and share
# it with auth.example.com. TLS-ALPN-01 still works through raw passthrough.
headscale_listen_addr: "0.0.0.0:443"
# Prometheus /metrics bind. Defaults to localhost (no exposure). Override from the
# deploy to the host's TAILNET IP (e.g. 100.x.y.z:9090) so the monitoring host can
# scrape it over the overlay — never 0.0.0.0 and never the public interface (the
# EC2 security group stays closed; the tailnet is the only path in).
headscale_metrics_listen_addr: "127.0.0.1:9090"
# MagicDNS suffix — deliberately a tailnet-only subdomain so it never clashes with
# the real Route53 zone.
headscale_base_domain: ts.example.com
headscale_acme_email: admin@example.com

# OIDC against Authentik — off until Authentik + the EC2 passthrough exist; then
# flip on and devices enrol with MFA at the IdP. Until then, short-lived pre-auth
# keys (issued by hand) bootstrap the routers + the laptop.
headscale_oidc_enabled: false
# Start headscale even when the OIDC provider (Authentik) is unreachable at boot.
# False here on purpose: the EC2 reaches auth.cw over the very overlay headscale
# runs, so a hard OIDC-at-startup dependency deadlocks (Authentik blip -> headscale
# won't start -> overlay degrades -> can't reach Authentik). Starting anyway breaks
# the loop; OIDC enrolment resumes by itself once Authentik is reachable again.
headscale_oidc_only_start_if_available: false
headscale_oidc_issuer: ""
headscale_oidc_client_id: ""
headscale_oidc_client_secret: ""
# Only members of this Authentik group may obtain the lab routes.
headscale_oidc_allowed_groups: ["lab-admins"]
# Requested scopes. Deliberately NOT "groups": that scope triggers Headscale's
# "empty OIDC callback params" failure (headscale#2887), and Authentik's "profile"
# scope already carries the groups claim that allowed_groups matches against.
headscale_oidc_scopes: ["openid", "profile", "email"]
