---
- name: Download the pinned Headscale package
  become: true
  ansible.builtin.get_url:
    url: "{{ headscale_deb_url }}"
    dest: "/tmp/{{ headscale_deb_name }}"
    checksum: "{{ headscale_checksum | default(omit, true) }}"
    mode: "0644"

- name: Install Headscale
  become: true
  ansible.builtin.apt:
    deb: "/tmp/{{ headscale_deb_name }}"

# Hold it so unattended-upgrades can never change or autoremove it (the incus outage
# showed what a package change under a running service does). It's a manually-installed
# pinned .deb, not in an apt repo, so the risk is low — this is belt-and-braces.
- name: Hold the Headscale package
  become: true
  ansible.builtin.dpkg_selections:
    name: headscale
    selection: hold

- name: Render the Headscale config
  become: true
  ansible.builtin.template:
    src: config.yaml.j2
    dest: /etc/headscale/config.yaml
    owner: root
    group: headscale
    mode: "0640"
  notify: Restart headscale

- name: Enable and start Headscale
  become: true
  ansible.builtin.systemd_service:
    name: headscale
    enabled: true
    state: started
