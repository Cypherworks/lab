---
# Automatic security updates. The free stand-in for Ubuntu Pro Livepatch/ESM:
# applies the security pocket nightly and reboots in a quiet window if needed.

unattended_upgrades_origins:
  - "${distro_id}:${distro_codename}-security"
  - "${distro_id}ESMApps:${distro_codename}-apps-security"
  - "${distro_id}ESM:${distro_codename}-infra-security"

unattended_upgrades_auto_reboot: true
unattended_upgrades_auto_reboot_time: "03:30"
unattended_upgrades_remove_unused_deps: true
