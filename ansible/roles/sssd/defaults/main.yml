---
# SSSD LDAP client against the Authentik LDAP outpost — IDENTITY (NSS) ONLY.
# id_provider=ldap gives the host LDAP-backed users/groups (getent, id). This role
# deliberately does NOT touch PAM or sshd: it can't affect login or sudo. The auth
# side (PAM sudo password, ssh-users access filter, pam_mkhomedir) and the SSH CA
# trust are a separate, carefully-rolled-out step.
#
# Site data (uris, bases, bind DN, CA cert) is set by the deploy; the bind password
# resolves from SOPS (ldap_search_password, shared with the Authentik blueprint).

sssd_packages:
  - sssd
  - sssd-ldap
  - sssd-tools        # sssctl — domain-status / cache diagnostics
  - libnss-sss
  - ldap-utils

# SSSD domain label (an arbitrary local name). Override in the deploy if desired.
sssd_domain_name: lab

# Per-node LDAPS outpost endpoints; SSSD fails over between them. Site data.
sssd_ldap_uris: []            # e.g. [ldaps://ldap-a:636, ldaps://ldap-b:636]
sssd_ldap_base_dn: ""          # e.g. dc=ldap,dc=example,dc=com
sssd_ldap_user_search_base: "ou=users,{{ sssd_ldap_base_dn }}"
sssd_ldap_group_search_base: "ou=groups,{{ sssd_ldap_base_dn }}"

# Search/bind account (the ldap-search service account). authtok = its app password
# (ldap_search_password, from SOPS).
sssd_ldap_bind_dn: ""          # e.g. cn=ldap-search,ou=users,dc=ldap,dc=example,dc=com
ldap_search_password: ""

# OpenBao CA (PEM, public); added to the system trust for the confined sssd_be.
sssd_ldap_ca_cert: ""

# Authentik LDAP schema is a hybrid (AD-ish objectClass=user/group + posixAccount +
# rfc2307bis member DNs). The login name is `cn` — `uid` is a hash, so the rfc2307
# default (name=uid) would surface usernames as hashes. No loginShell attribute is
# served, so a default shell is required or logins get no shell.
sssd_default_shell: /bin/bash
sssd_fallback_homedir: /home/%u

# NSS databases to point at SSSD. Whole-line (idempotent); the default matches the
# Debian/Ubuntu stock lines plus sss. shadow is intentionally omitted here — that's
# auth territory, part of the later PAM step.
sssd_nsswitch:
  - { db: passwd, value: "files systemd sss" }
  - { db: group, value: "files systemd sss" }

# enumerate=false: look users up on demand (recommended) rather than pulling the
# whole directory.
sssd_enumerate: false

# Synthesize a user-private primary group when uid == gid and no real group owns that
# gid — resolves Authentik's nameless private primary groups. hybrid respects a real
# primary group if the user has one; true would always force gid=uid.
sssd_auto_private_groups: hybrid

# --- PAM auth (login/sudo) — CONNECTIVITY-SENSITIVE, default OFF -------------
# When false (default) this role is identity-only (NSS) and cannot affect login or
# sudo. Flip to true ONLY with console/break-glass access to the host: it adds
# auth_provider + access_provider to SSSD and enables the sss + mkhomedir PAM
# profiles, so sudo authenticates against Authentik (password) and only members of
# sssd_ssh_access_group may log in. Local root/ansible keep working via pam_unix.
sssd_enable_pam_auth: false
# LDAP group whose members are allowed to log in (PAM access filter on memberOf).
sssd_ssh_access_group: ssh-users
# LDAP group granted sudo (password-authenticated) via a sudoers.d drop-in. Separate
# from login: a user needs sssd_ssh_access_group to log in AND this to escalate.
# Empty = no sudo rule installed.
sssd_sudo_group: ssh-sudoers
# PAM profiles enabled via pam-auth-update when auth is on. mkhomedir auto-creates
# home dirs on first login; sss wires pam_sss for auth/account/session.
sssd_pam_profiles:
  - sss
  - mkhomedir
# Accounts SSSD must never resolve from LDAP (kept local, always). root + the Ansible
# login are here so a directory problem can't shadow them or block key-based SSH.
sssd_local_exempt_users:
  - root
  - ansible
