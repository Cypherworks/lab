---
# Docker itself comes from the shared `docker` role (meta dependency).
- name: Create the speedtest directory
  become: true
  ansible.builtin.file:
    path: "{{ speedtest_compose_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Render the speedtest env (APP_KEY secret)
  become: true
  ansible.builtin.template:
    src: env.j2
    dest: "{{ speedtest_compose_dir }}/.env"
    owner: root
    group: root
    mode: "0600"
  notify: Restart speedtest

- name: Render the speedtest compose
  become: true
  ansible.builtin.template:
    src: compose.yaml.j2
    dest: "{{ speedtest_compose_dir }}/compose.yaml"
    owner: root
    group: root
    mode: "0600"
  notify: Restart speedtest

- name: Start the speedtest stack
  become: true
  community.docker.docker_compose_v2:
    project_src: "{{ speedtest_compose_dir }}"
    state: present
    pull: missing

# Prometheus export is a UI-only setting (spatie laravel-settings, group
# `dataintegration`), no env var (upstream #2500). tinker is stripped from the
# production image, so bootstrap Laravel from a piped script and set it via the
# settings class (which handles the settings cache on save). Idempotent: only saves
# (and reports changed) when the value differs. Retries while the app migrates on
# first boot. Runs as the app user (abc) so cache/DB ownership stays correct.
- name: Enable the Prometheus data integration (allow-listed to the scraper)
  become: true
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - "{{ speedtest_compose_dir }}/compose.yaml"
      - exec
      - -T
      - -u
      - abc
      - speedtest-tracker
      - php
    stdin: |
      <?php
      require '/app/www/vendor/autoload.php';
      $app = require '/app/www/bootstrap/app.php';
      $app->make(Illuminate\Contracts\Console\Kernel::class)->bootstrap();
      $s = $app->make(App\Settings\DataIntegrationSettings::class);
      $ips = json_decode('{{ speedtest_prometheus_allowed_ips | to_json }}', true);
      if ($s->prometheus_enabled !== true || $s->prometheus_allowed_ips !== $ips) {
          $s->prometheus_enabled = true;
          $s->prometheus_allowed_ips = $ips;
          $s->save();
          echo 'CHANGED';
      }
  register: _speedtest_prometheus
  changed_when: "'CHANGED' in _speedtest_prometheus.stdout"
  until: _speedtest_prometheus.rc == 0
  retries: 10
  delay: 6
  when: speedtest_prometheus_enabled
